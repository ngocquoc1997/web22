<!DOCTYPE html>
<html>
<head>
  <title>Web của Ngọc</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      padding: 50px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
    }
    a {
      display: block;
      margin: 10px;
      padding: 10px;
      background: #4facfe;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h1>🔗 Link của tôi</h1>

  <div class="box">
    <a href="https://facebook.com">Facebook</a>
    <a href="https://youtube.com">YouTube</a>
    <a href="https://google.com">Google</a>
  </div>

</body>
</html>
